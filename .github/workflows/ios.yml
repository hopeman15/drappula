name: iOS 🍎

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IOS_SIMULATOR: ${{ vars.IOS_SIMULATOR }}

jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Linting
        run: make lint-ios

  test:
    name: Test & Report
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '19'
          cache: 'gradle'
      - name: Decrypt GoogleService-Info.plist (Production)
        run: |
          ./scripts/decrypt.sh ios/drappula/Firebase/Production/GoogleService-Info.plist.gpg ios/drappula/Firebase/Production/GoogleService-Info.plist ${{ secrets.FIREBASE_GPG }}
      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available -j | jq -r ".devices[] | .[] | select(.name == \"$IOS_SIMULATOR\") | .udid" | head -1)
          if [ -z "$UDID" ]; then
            echo "::error::No available simulator named '$IOS_SIMULATOR' found. Available devices:"
            xcrun simctl list devices available
            exit 1
          fi
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
      - name: Build iOS Framework
        run: make build-ios-simulator
      - name: Wait for simulator
        run: xcrun simctl bootstatus "$SIMULATOR_UDID" -b
      - name: Test
        run: make IOS_FLAVOR=Production report-ios
      - name: Report
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./build/ios/results.xcresult
          flags: ios
          token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '19'
          cache: 'gradle'
      - name: Decrypt GoogleService-Info.plist (Production)
        run: |
          ./scripts/decrypt.sh ios/drappula/Firebase/Production/GoogleService-Info.plist.gpg ios/drappula/Firebase/Production/GoogleService-Info.plist ${{ secrets.FIREBASE_GPG }}
      - name: Create Secrets.plist
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          PRIVACY_POLICY_URL: ${{ vars.PRIVACY_POLICY_URL }}
        run: scripts/create-secrets-plist.sh
      - name: Build iOS Framework
        run: make build-ios
      - name: Build iOS App
        run: make IOS_FLAVOR=Production build-ios-native
