name: Labeling 🏷️

on:
  pull_request:
    types: [ synchronize, opened, reopened ]

jobs:
  labeling:
    name: Adding Labels
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      pull-requests: write
      repository-projects: write
    steps:
      - name: Labeling
        uses: hopeman15/labelicious@0.4.0
        with:
          keywords: "Android,iOS"
          labels: "Android :robot:,iOS :apple:"
